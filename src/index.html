<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Domain Name Generator - David Martinez</title>
    <link
      rel="stylesheet"
      href="https://use.fontawesome.com/releases/v5.2.0/css/all.css"
    />
  </head>
  <body>
    <div class="container-fluid text-center mt-5">
      <h1><i class="fas fa-globe-americas"></i> Domain Name Generator</h1>
      <p class="mt-3 text-muted" id="count">Generando dominios...</p>
      
      <div class="card mt-4 mx-auto" style="max-width: 600px;">
        <div class="card-header bg-dark text-white font-weight-bold">
          Generated Domains
        </div>
        <ul class="list-group list-group-flush" id="domain-list">
          <li class="list-group-item text-muted">Cargando combinaciones...</li>
        </ul>
      </div>

      <footer class="p-4 mt-5">
        Made with ❤️ by <strong>David Martínez</strong>
      </footer>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
